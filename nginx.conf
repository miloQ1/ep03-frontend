server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy al backend — BACKEND_HOST se reemplaza en runtime con envsubst
    # En local (docker compose): BACKEND_HOST=backend
    # En AWS (EC2):              BACKEND_HOST=10.0.1.x (IP privada de EC2-App)
    location /ep03 {
        proxy_pass         http://${BACKEND_HOST}:8080/ep03;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
